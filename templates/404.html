{% extends "base.html" %}

{% block title %}404 - 頁面未找到{% endblock %}

{% block content %}
<div class="container">
    <section class="error-section">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">頁面未找到</h2>
            <p class="error-message">
                抱歉，您訪問的頁面不存在或已被移除。
                請檢查 URL 是否正確。
            </p>
            <div class="error-actions">
                <a href="/" class="btn btn-primary">返回首頁</a>
                <a href="/tech-logs" class="btn btn-secondary">查看文章</a>
            </div>
        </div>
    </section>
</div>
{% endblock %}
